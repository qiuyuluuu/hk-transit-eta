<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f5ef">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="白石角巴士">
    <title>白石角巴士</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png">
    <link rel="shortcut icon" href="assets/icons/favicon.ico">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <button class="refresh-button" id="refreshButton" type="button">刷新</button>
        <span class="topbar-status" id="lastUpdatedAt">等待更新</span>
      </header>

      <nav class="view-switch" aria-label="通勤方向">
        <button class="view-switch-button is-active" type="button" data-view="workbound" aria-pressed="true">上班</button>
        <button class="view-switch-button" type="button" data-view="homebound" aria-pressed="false">下班</button>
      </nav>

      <div class="commute-groups" id="stopsRoot" aria-live="polite"></div>

      <footer class="app-footer">
        <span>Developed by Dr. Lu</span>
        <a href="https://github.com/qiuyuluuu/hk-transit-eta" target="_blank" rel="noopener noreferrer">GitHub</a>
      </footer>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
